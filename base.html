<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}{{ agent_name }} — AI Nutrition Agent{% endblock %}</title>

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <!-- Bootstrap Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
  <!-- App CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- ── Navbar ───────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg fixed-top navbar-glass">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="/">
      <span class="brand-icon"><i class="bi bi-activity"></i></span>
      <span>{{ agent_name }}</span>
    </a>
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav ms-auto align-items-center gap-1">
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
            <i class="bi bi-chat-dots me-1"></i>Chat
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/dashboard' %}active{% endif %}" href="/dashboard">
            <i class="bi bi-grid-1x2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/meal-planner' %}active{% endif %}" href="/meal-planner">
            <i class="bi bi-journal-text me-1"></i>Meal Planner
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/bmi-calculator' %}active{% endif %}" href="/bmi-calculator">
            <i class="bi bi-bar-chart-line me-1"></i>BMI &amp; TDEE
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if request.path == '/family-profiles' %}active{% endif %}" href="/family-profiles">
            <i class="bi bi-people me-1"></i>Family
          </a>
        </li>
        <li class="nav-item ms-2">
          <button id="darkModeToggle" class="btn btn-sm btn-outline-secondary rounded-pill px-3" title="Toggle dark mode">
            <i class="bi bi-moon-stars-fill" id="darkIcon"></i>
          </button>
        </li>
      </ul>
    </div>
  </div>
</nav>

<!-- ── Page content ──────────────────────────────────────────────────────── -->
<main class="main-content">
  {% block content %}{% endblock %}
</main>

<!-- ── Footer ────────────────────────────────────────────────────────────── -->
<footer class="app-footer text-center py-3 mt-auto">
  <small class="text-muted">
    Powered by <strong>IBM Watsonx.ai</strong> Granite &nbsp;|&nbsp;
    Built with Flask &nbsp;|&nbsp; {{ agent_name }} &copy; 2025
  </small>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- App JS -->
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
